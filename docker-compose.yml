services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: detailing
      POSTGRES_USER: detailing
      POSTGRES_PASSWORD: detailing
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detailing -d detailing"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed && python -m app.main"]
    healthcheck:
      test: ["CMD", "python", "-m", "app.health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
